<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稻庄休閒農場</title>
<style>
body{margin:0;font-family:sans-serif;background:#f6f4ec;color:#2f3328}
.hero{height:90vh;background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.5)),url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");background-size:cover;display:flex;align-items:center;padding:40px;color:#fff}
.hero h1{font-size:36px}
.btn{display:inline-block;margin-top:20px;padding:12px 24px;border-radius:30px;text-decoration:none;font-weight:bold}
.line{background:#06C755;color:#fff}
.map{background:#f5d46b;color:#000}
.section{padding:40px 20px;text-align:center}
.card{background:#fff;margin:10px;padding:20px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.cta{background:#35462b;color:#fff;padding:40px 20px;text-align:center}
.cta button{padding:14px 24px;font-size:16px;border:none;border-radius:30px;background:#f5d46b}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>來稻庄，不只是玩<br>是帶孩子走進土地的第一步</h1>
    <a href="https://line.me/" class="btn line">📲 加LINE預約</a>
    <a href="https://maps.google.com" class="btn map">📍 導航來農場</a>
  </div>
</div>

<div class="section">
  <h2>親子體驗</h2>
  <div class="card">🐹 水豚互動</div>
  <div class="card">🎣 撈魚 / 釣魚</div>
  <div class="card">🥬 蔥油餅DIY</div>
  <div class="card">🌵 多肉體驗</div>
</div>

<div class="cta">
  <h2>現在就來體驗</h2>
  <button onclick="alert('稻庄賣的是回憶')">了解更多</button>
</div>

</body>
</html>
